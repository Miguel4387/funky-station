- type: entity
  parent: BaseWall
  id: DebugWallTrimmed
  name: trimmed debug wall
  suffix: DEBUG
  components:
  - type: Tag
    tags:
      - Wall
  - type: Sprite
    sprite: _Funkystation/Structures/Walls/test/edgetrim.rsi
  - type: Icon
    sprite: _Funkystation/Structures/Walls/test/edgetrim.rsi
    state: icon
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: EdgeTrim
    smoothKey: debug1
    base: test
    edgeKeys:
    - debug2

